[ids]
*

[main]
# 1. Default behavior: CapsLock opens the [caps] layer
capslock = layer(caps) 
f12 = overload(fn, f12)
v = overload(numpad, grave)

[caps]
# Your navigation keys
h = left
j = down
k = up
l = right

u = home
i = end
o = pageup
p = pagedown

left = brightnessdown
right = brightnessup
up = volumeup
down = volumedown

a = previoussong
s = playpause
d = nextsong

[fn]
# 2. The Toggle Switch
capslock = toggle(normal_mode)

[normal_mode]
# 3. This layer overrides [main] when toggled on.
# We force CapsLock to behave like a standard key here.
capslock = capslock
[numpad]
# --- THE MATH PAD (Right Hand) ---
# Top Row
u = 7
i = 8
o = 9

# Home Row
j = 4
k = 5
l = 6

# Bottom Row
m = 1
, = 2
. = 3

# The Zero
/ = 0

